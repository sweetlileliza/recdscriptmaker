<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script & Direction Workspace</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-alt: #1a1a1a;
            --border: #333333;
            --border-thick: #555555;
            --text: #e0e0e0;
            --text-dim: #888888;
            --accent: #ffffff;
            --accent-dim: rgba(255, 255, 255, 0.1);
            --shot-color: #f39c12;
            --danger: #e74c3c;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .instructions { font-size: 0.8rem; color: var(--text-dim); margin-right: 1.5rem; }
        #editor-container { padding: 2rem; }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            table-layout: fixed;
        }

        th {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-dim);
        }

        .col-shot { width: 8%; text-align: center; }
        .col-script { width: 44%; }
        .col-direction { width: 44%; }
        .col-actions { width: 4%; text-align: center; } /* New column for delete buttons */

        /* Shot Group Separation */
        .shot-group {
            border-top: 4px solid var(--border-thick);
        }

        /* Shot Header Row */
        .shot-header-cell {
            background-color: var(--surface-alt);
            padding: 0 !important;
            border-bottom: 1px solid var(--border);
        }

        .shot-header-content {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
        }

        .shot-label {
            color: var(--shot-color);
            font-weight: 600;
            margin-right: 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .shot-intro {
            flex-grow: 1;
            font-weight: 600;
            color: var(--text);
            outline: none;
        }

        /* Panel Rows */
        td {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            word-wrap: break-word;
        }

        .shot-cell {
            color: var(--shot-color);
            font-weight: bold;
            text-align: center;
            font-family: monospace;
            font-size: 1.1rem;
            border-right: 1px solid var(--border);
            user-select: none;
        }

        .script-cell { border-right: 1px solid var(--border); }
        .direction-cell { color: #aaa; font-style: italic; border-right: 1px solid var(--border); }

        /* Placeholders for empty text boxes */
        [contenteditable]:empty::before {
            content: attr(data-placeholder);
            color: #555;
            pointer-events: none;
        }

        [contenteditable]:focus { outline: none; background-color: var(--accent-dim); }

        /* Buttons & Actions */
        .button-group { display: inline-flex; gap: 0.5rem; margin-left: 1rem; border-left: 1px solid var(--border); padding-left: 1rem; }
        
        button.toolbar-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-size: 0.9rem;
        }

        button.toolbar-btn.primary { background: var(--accent); color: var(--bg); font-weight: 600; }
        button.toolbar-btn.shot-btn { border-color: var(--shot-color); color: var(--shot-color); }
        button.toolbar-btn.shot-btn:hover { background: var(--shot-color); color: var(--bg); }
        button.toolbar-btn:hover:not(.shot-btn) { border-color: var(--accent); }

        /* Delete Buttons */
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--border-thick);
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            opacity: 0; /* Hidden by default */
        }
        
        tr:hover .delete-btn { opacity: 1; } /* Show on row hover */
        .delete-btn:hover { color: var(--danger); }
    </style>
</head>
<body>
    <nav class="toolbar">
        <h1>Art Doc Maker</h1>
        <div class="actions">
            <span class="instructions">Shortcut: <strong>Shift + Enter</strong> to break panel</span>
            <button class="toolbar-btn" onclick="exportWord()">Doc</button>
            <button class="toolbar-btn" onclick="exportCSV()">CSV</button>
            
            <div class="button-group">
                <button class="toolbar-btn primary" onclick="addPanelAtBottom()">+ Panel</button>
                <button class="toolbar-btn shot-btn" onclick="addShotAtBottom()">+ New Shot</button>
            </div>
        </div>
    </nav>

    <main id="editor-container">
        <table id="script-table">
            <thead>
                <tr>
                    <th class="col-shot">Shot</th>
                    <th class="col-script">Script Segment</th>
                    <th class="col-direction">Direction & Notes</th>
                    <th class="col-actions"></th>
                </tr>
            </thead>
            <!-- The Javascript will inject 'shot-groups' (tbodies) here -->
        </table>
    </main>

    <script>
        // --- CORE HTML GENERATORS ---
        function createShotGroup() {
            const tbody = document.createElement('tbody');
            tbody.className = 'shot-group';
            
            tbody.innerHTML = `
                <tr class="shot-header-row hide-in-csv">
                    <td colspan="4" class="shot-header-cell">
                        <div class="shot-header-content">
                            <span class="shot-label">SHOT X</span>
                            <div contenteditable="true" class="shot-intro" data-placeholder="Add scene setting, location, or shot description here..."></div>
                            <button class="delete-btn" onclick="deleteShot(this)" title="Delete Entire Shot">✖</button>
                        </div>
                    </td>
                </tr>
            `;
            tbody.appendChild(createPanelRow());
            return tbody;
        }

        function createPanelRow() {
            const tr = document.createElement('tr');
            tr.className = 'panel-row';
            tr.innerHTML = `
                <td class="shot-cell"></td>
                <td contenteditable="true" class="script-cell" data-placeholder="Script..."></td>
                <td contenteditable="true" class="direction-cell" data-placeholder="Direction..."></td>
                <td class="action-cell">
                    <button class="delete-btn hide-in-export" onclick="deletePanel(this)" title="Delete Panel">✖</button>
                </td>
            `;
            return tr;
        }

        // --- NUMBERING & LOGIC ---
        function getPanelLetter(index) {
            let letter = '';
            while (index >= 0) {
                letter = String.fromCharCode(65 + (index % 26)) + letter;
                index = Math.floor(index / 26) - 1;
            }
            return letter;
        }

        // Calculates shot/panel numbers based on the visual layout of the tables
        function reindexTable() {
            const shotGroups = document.querySelectorAll('.shot-group');
            
            shotGroups.forEach((group, shotIndex) => {
                const shotNum = shotIndex + 1;
                
                // Update the Shot Header Label
                group.querySelector('.shot-label').innerText = `SHOT ${shotNum}`;

                // Update all panels inside this specific shot
                const panels = group.querySelectorAll('.panel-row');
                panels.forEach((panel, panelIndex) => {
                    panel.querySelector('.shot-cell').innerText = `${shotNum}${getPanelLetter(panelIndex)}`;
                });
            });
        }

        // --- ADD/DELETE FUNCTIONS ---
        function addShotAtBottom() {
            const table = document.getElementById('script-table');
            const newShot = createShotGroup();
            table.appendChild(newShot);
            reindexTable();
            newShot.querySelector('.shot-intro').focus();
        }

        function addPanelAtBottom() {
            const groups = document.querySelectorAll('.shot-group');
            if (groups.length === 0) {
                addShotAtBottom();
                return;
            }
            // Add to the very last shot group
            const lastGroup = groups[groups.length - 1];
            const newPanel = createPanelRow();
            lastGroup.appendChild(newPanel);
            reindexTable();
            newPanel.querySelector('.script-cell').focus();
        }

        function deletePanel(btnElement) {
            const row = btnElement.closest('.panel-row');
            const group = row.closest('.shot-group');
            row.remove();
            
            // If that was the last panel in the shot, delete the whole shot
            if (group.querySelectorAll('.panel-row').length === 0) {
                group.remove();
            }
            reindexTable();
        }

        function deleteShot(btnElement) {
            if (confirm("Are you sure you want to delete this entire shot and all its panels?")) {
                btnElement.closest('.shot-group').remove();
                reindexTable();
            }
        }

        // --- SNIPPING LOGIC (Maintained & Updated for Panels) ---
        function splitRowAtCursor(currentRow) {
            const activeElement = document.activeElement;
            
            if (!activeElement.classList.contains('script-cell')) {
                // If hitting shift+enter in a direction or header, just add a blank panel below
                const newRow = createPanelRow();
                currentRow.parentNode.insertBefore(newRow, currentRow.nextSibling);
                reindexTable();
                newRow.querySelector('.script-cell').focus();
                return;
            }

            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);

            if (!selection.isCollapsed) range.deleteContents();

            const marker = document.createElement('span');
            marker.id = 'split-marker-temp';
            range.insertNode(marker);

            const htmlContent = activeElement.innerHTML;
            const parts = htmlContent.split('<span id="split-marker-temp"></span>');

            activeElement.innerHTML = parts[0].trim();

            const newRow = createPanelRow(); 
            currentRow.parentNode.insertBefore(newRow, currentRow.nextSibling);

            const newScriptCell = newRow.querySelector('.script-cell');
            let newText = parts[1] || '';
            if (newText.startsWith('<br>')) { newText = newText.substring(4); }
            newScriptCell.innerHTML = newText.trim();

            reindexTable();
            newScriptCell.focus();
        }

        // --- EXPORT LOGIC ---
        function exportWord() {
            const tableClone = document.getElementById('script-table').cloneNode(true);
            
            // Cleanup clone for Word
            tableClone.querySelectorAll('.delete-btn').forEach(btn => btn.remove());
            tableClone.querySelectorAll('.col-actions').forEach(col => col.remove());
            tableClone.querySelectorAll('.action-cell').forEach(cell => cell.remove());
            tableClone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));

            const html = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                <head><meta charset="utf-8"><title>Script Breakdown</title>
                <style>
                    table { border-collapse: collapse; width: 100%; font-family: Arial, sans-serif; }
                    th, td { border: 1px solid #000000; padding: 10px; vertical-align: top; }
                    th { background-color: #f2f2f2; text-align: left; }
                    .shot-header-cell { background-color: #e6e6e6; font-weight: bold; padding: 10px; }
                    .shot-label { color: #b87333; margin-right: 15px; }
                    .direction-cell { color: #444444; font-style: italic; }
                    .shot-cell { font-weight: bold; text-align: center; }
                </style></head>
                <body>${tableClone.outerHTML}</body></html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'script_breakdown.doc';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Shot,Script,Direction\n";
            const groups = document.querySelectorAll('.shot-group');

            groups.forEach(group => {
                // Add a header row in the CSV for the Shot Intro
                const shotLabel = group.querySelector('.shot-label').innerText;
                const shotIntro = group.querySelector('.shot-intro').innerText.replace(/"/g, '""');
                csvContent += `"${shotLabel}","${shotIntro}",""\n`;

                // Add all the panels
                const panels = group.querySelectorAll('.panel-row');
                panels.forEach(panel => {
                    let shot = panel.querySelector('.shot-cell').innerText;
                    let script = panel.querySelector('.script-cell').innerText.replace(/"/g, '""');
                    let direction = panel.querySelector('.direction-cell').innerText.replace(/"/g, '""');
                    csvContent += `"${shot}","${script}","${direction}"\n`;
                });
            });

            const link = document.createElement("a");
            link.href = encodeURI(csvContent);
            link.download = "script_breakdown.csv";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        // --- EVENTS ---
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === 'Enter') {
                e.preventDefault(); 
                const activeElement = document.activeElement;
                if (activeElement.tagName === 'TD' || activeElement.classList.contains('script-cell')) {
                    splitRowAtCursor(activeElement.closest('.panel-row'));
                }
            }
        });

        // Init First Shot on Load
        window.onload = addShotAtBottom;
    </script>
</body>
</html>
