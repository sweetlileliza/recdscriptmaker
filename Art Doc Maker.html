<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script & Direction Workspace</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-alt: #1a1a1a;
            --border: #333333;
            --border-thick: #555555;
            --text: #e0e0e0;
            --text-dim: #888888;
            --accent: #ffffff;
            --accent-dim: rgba(255, 255, 255, 0.1);
            --shot-color: #f39c12;
            --money-color: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Project Name Input */
        .project-name-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            width: 250px;
            padding: 0.2rem 0;
        }

        .project-name-input:focus {
            border-bottom: 2px solid var(--accent);
        }
        
        .instructions { 
            font-size: 0.8rem; 
            color: var(--text-dim); 
            margin-right: 1rem; 
            background: var(--surface-alt);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .instructions strong { color: var(--accent); }

        #editor-container { padding: 2rem; }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            table-layout: fixed;
        }

        th {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-dim);
        }

        .col-shot { width: 6%; text-align: center; }
        .col-script { width: 35%; }
        .col-direction { width: 35%; }
        .col-type { width: 18%; }
        .col-actions { width: 6%; text-align: center; }

        .shot-group { border-top: 4px solid var(--border-thick); }

        .shot-header-cell {
            background-color: var(--surface-alt);
            padding: 0 !important;
            border-bottom: 1px solid var(--border);
        }

        .shot-header-content {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
        }

        .shot-label {
            color: var(--shot-color);
            font-weight: 600;
            margin-right: 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .shot-intro {
            flex-grow: 1;
            font-weight: 600;
            color: var(--text);
            outline: none;
        }

        .shot-total {
            background: rgba(46, 204, 113, 0.1);
            color: var(--money-color);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 1rem;
            font-family: monospace;
            font-size: 1rem;
            white-space: nowrap;
        }

        td {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            word-wrap: break-word;
        }

        .shot-cell {
            color: var(--shot-color);
            font-weight: bold;
            text-align: center;
            font-family: monospace;
            font-size: 1.1rem;
            border-right: 1px solid var(--border);
            user-select: none;
        }

        .script-cell, .direction-cell { border-right: 1px solid var(--border); }
        .direction-cell { color: #aaa; font-style: italic; }
        .type-cell { border-right: 1px solid var(--border); vertical-align: middle; }

        select.panel-type-select {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.6rem;
            width: 100%;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        select.panel-type-select:hover, select.panel-type-select:focus { border-color: var(--shot-color); }

        [contenteditable]:empty::before { content: attr(data-placeholder); color: #555; pointer-events: none; }
        [contenteditable]:focus { outline: none; background-color: var(--accent-dim); }

        .actions-right { display: flex; align-items: center; }
        
        .button-group { 
            display: inline-flex; 
            gap: 0.5rem; 
            margin-left: 1rem; 
            border-left: 1px solid var(--border); 
            padding-left: 1rem; 
        }
        
        button.toolbar-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-size: 0.9rem;
        }

        button.toolbar-btn.primary { background: var(--accent); color: var(--bg); font-weight: 600; }
        button.toolbar-btn.shot-btn { border-color: var(--shot-color); color: var(--shot-color); }
        button.toolbar-btn.shot-btn:hover { background: var(--shot-color); color: var(--bg); }
        button.toolbar-btn:hover:not(.shot-btn):not(:disabled) { border-color: var(--accent); }
        
        button.toolbar-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border); }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--border-thick);
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            opacity: 0;
            padding: 0.5rem;
        }
        tr:hover .delete-btn, .shot-header-row:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--danger); }
    </style>
</head>
<body>
    <nav class="toolbar">
        <input type="text" id="project-name" class="project-name-input" placeholder="Project Name..." value="Untitled Project">
        
        <div class="actions-right">
            <div class="button-group" style="margin-right: 1rem; padding-right: 1rem; border-right: 1px solid var(--border); border-left: none;">
                <button id="btn-undo" class="toolbar-btn" onclick="undo()" title="Undo Structure (Ctrl+Z)" disabled>↺</button>
                <button id="btn-redo" class="toolbar-btn" onclick="redo()" title="Redo Structure (Ctrl+Y)" disabled>↻</button>
            </div>

            <span class="instructions">
                <strong>Shift+Enter</strong> (New Panel) &nbsp;|&nbsp; <strong>Ctrl+Enter</strong> (New Shot)
            </span>
            <button class="toolbar-btn" onclick="exportWord()">Doc</button>
            <button class="toolbar-btn" onclick="exportCSV()">CSV</button>
            
            <div class="button-group">
                <button class="toolbar-btn primary" onclick="addPanelAtBottom()">+ Panel</button>
                <button class="toolbar-btn shot-btn" onclick="addShotAtBottom()">+ New Shot</button>
            </div>
        </div>
    </nav>

    <main id="editor-container">
        <table id="script-table">
            <thead>
                <tr>
                    <th class="col-shot">Shot</th>
                    <th class="col-script">Script Segment</th>
                    <th class="col-direction">Direction & Notes</th>
                    <th class="col-type">Panel Type</th>
                    <th class="col-actions"></th>
                </tr>
            </thead>
            </table>
    </main>

    <script>
        const PRICING = { "NONE": 0, "COMPLEX BASE": 36, "SIMPLE BASE": 18, "COMPLEX ALT": 9, "SIMPLE ALT": 3 };

        // --- STATE MANAGEMENT (UNDO / REDO) ---
        let historyStack = [];
        let redoStack = [];

        function updateUndoRedoButtons() {
            document.getElementById('btn-undo').disabled = historyStack.length === 0;
            document.getElementById('btn-redo').disabled = redoStack.length === 0;
        }

        function saveState() {
            document.querySelectorAll('.panel-type-select').forEach(select => {
                Array.from(select.options).forEach(opt => {
                    if (opt.value === select.value) {
                        opt.setAttribute('selected', 'selected');
                    } else {
                        opt.removeAttribute('selected');
                    }
                });
            });

            const currentHtml = document.getElementById('script-table').innerHTML;
            
            if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== currentHtml) {
                historyStack.push(currentHtml);
                if (historyStack.length > 50) historyStack.shift(); 
                redoStack = []; 
                updateUndoRedoButtons();
            }
        }

        function undo() {
            if (historyStack.length > 0) {
                const currentHtml = document.getElementById('script-table').innerHTML;
                redoStack.push(currentHtml);
                
                const previousHtml = historyStack.pop();
                document.getElementById('script-table').innerHTML = previousHtml;
                
                reindexTable();
                updateUndoRedoButtons();
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                const currentHtml = document.getElementById('script-table').innerHTML;
                historyStack.push(currentHtml);
                
                const nextHtml = redoStack.pop();
                document.getElementById('script-table').innerHTML = nextHtml;
                
                reindexTable();
                updateUndoRedoButtons();
            }
        }

        // --- CORE HTML GENERATORS ---
        function createShotGroup() {
            const tbody = document.createElement('tbody');
            tbody.className = 'shot-group';
            tbody.innerHTML = `
                <tr class="shot-header-row hide-in-csv">
                    <td colspan="5" class="shot-header-cell">
                        <div class="shot-header-content">
                            <span class="shot-label">SHOT X</span>
                            <div contenteditable="true" class="shot-intro" data-placeholder="Add scene setting, location, or shot description here..."></div>
                            <div class="shot-total">Total: $0</div>
                            <button class="delete-btn" onclick="deleteShot(this)" title="Delete Entire Shot">✖</button>
                        </div>
                    </td>
                </tr>
            `;
            tbody.appendChild(createPanelRow());
            return tbody;
        }

        function createPanelRow() {
            const tr = document.createElement('tr');
            tr.className = 'panel-row';
            tr.innerHTML = `
                <td class="shot-cell"></td>
                <td contenteditable="true" class="script-cell" data-placeholder="Script..."></td>
                <td contenteditable="true" class="direction-cell" data-placeholder="Direction..."></td>
                <td class="type-cell">
                    <select class="panel-type-select" onchange="calculateTotals()">
                        <option value="NONE">Select Type...</option>
                        <option value="COMPLEX BASE">Complex Base ($36)</option>
                        <option value="SIMPLE BASE">Simple Base ($18)</option>
                        <option value="COMPLEX ALT">Complex Alt ($9)</option>
                        <option value="SIMPLE ALT">Simple Alt ($3)</option>
                    </select>
                </td>
                <td class="action-cell">
                    <button class="delete-btn hide-in-export" onclick="deletePanel(this)" title="Delete Panel">✖</button>
                </td>
            `;
            return tr;
        }

        // --- LOGIC & CALCULATION ---
        function getPanelLetter(index) {
            let letter = '';
            while (index >= 0) {
                letter = String.fromCharCode(65 + (index % 26)) + letter;
                index = Math.floor(index / 26) - 1;
            }
            return letter;
        }

        function calculateTotals() {
            const shotGroups = document.querySelectorAll('.shot-group');
            shotGroups.forEach(group => {
                let shotTotal = 0;
                group.querySelectorAll('.panel-type-select').forEach(select => {
                    shotTotal += PRICING[select.value] || 0;
                });
                group.querySelector('.shot-total').innerText = `Total: $${shotTotal}`;
            });
        }

        function reindexTable() {
            const shotGroups = document.querySelectorAll('.shot-group');
            shotGroups.forEach((group, shotIndex) => {
                const shotNum = shotIndex + 1;
                group.querySelector('.shot-label').innerText = `SHOT ${shotNum}`;
                
                group.querySelectorAll('.panel-row').forEach((panel, panelIndex) => {
                    panel.querySelector('.shot-cell').innerText = `${shotNum}${getPanelLetter(panelIndex)}`;
                });
            });
            calculateTotals(); 
        }

        // --- ADD/DELETE FUNCTIONS ---
        function addShotAtBottom() {
            saveState(); 
            const table = document.getElementById('script-table');
            const newShot = createShotGroup();
            table.appendChild(newShot);
            reindexTable();
            return newShot;
        }

        function addPanelAtBottom() {
            const groups = document.querySelectorAll('.shot-group');
            if (groups.length === 0) { addShotAtBottom(); return; }
            
            saveState(); 
            const lastGroup = groups[groups.length - 1];
            const newPanel = createPanelRow();
            lastGroup.appendChild(newPanel);
            reindexTable();
            
            const cell = newPanel.querySelector('.script-cell');
            if(cell) cell.focus();
        }

        function deletePanel(btnElement) {
            saveState(); 
            const row = btnElement.closest('.panel-row');
            const group = row.closest('.shot-group');
            row.remove();
            
            if (group.querySelectorAll('.panel-row').length === 0) { group.remove(); }
            reindexTable();
        }

        function deleteShot(btnElement) {
            if (confirm("Are you sure you want to delete this entire shot and all its panels?")) {
                saveState(); 
                btnElement.closest('.shot-group').remove();
                reindexTable();
            }
        }

        // --- SNIPPING LOGIC ---
        function splitRowAtCursor(currentRow) {
            const activeElement = document.activeElement;
            saveState(); 
            
            if (!activeElement.classList.contains('script-cell')) {
                const newRow = createPanelRow();
                currentRow.parentNode.insertBefore(newRow, currentRow.nextSibling);
                reindexTable();
                newRow.querySelector('.script-cell').focus();
                return;
            }

            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);

            if (!selection.isCollapsed) range.deleteContents();

            const marker = document.createElement('span');
            marker.id = 'split-marker-temp';
            range.insertNode(marker);

            const parts = activeElement.innerHTML.split('<span id="split-marker-temp"></span>');
            activeElement.innerHTML = parts[0].trim();

            const newRow = createPanelRow(); 
            currentRow.parentNode.insertBefore(newRow, currentRow.nextSibling);

            const newScriptCell = newRow.querySelector('.script-cell');
            let newText = parts[1] || '';
            if (newText.startsWith('<br>')) newText = newText.substring(4);
            newScriptCell.innerHTML = newText.trim();

            reindexTable();
            newScriptCell.focus();
        }

        function splitRowIntoNewShot(currentRow) {
            const activeElement = document.activeElement;
            const currentGroup = currentRow.closest('.shot-group');
            saveState(); 
            
            if (!activeElement.classList.contains('script-cell')) {
                const newShot = createShotGroup();
                currentGroup.parentNode.insertBefore(newShot, currentGroup.nextSibling);
                reindexTable();
                newShot.querySelector('.shot-intro').focus();
                return;
            }

            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);

            if (!selection.isCollapsed) range.deleteContents();

            const marker = document.createElement('span');
            marker.id = 'split-marker-temp';
            range.insertNode(marker);

            const parts = activeElement.innerHTML.split('<span id="split-marker-temp"></span>');
            activeElement.innerHTML = parts[0].trim();

            const newShotGroup = createShotGroup(); 
            currentGroup.parentNode.insertBefore(newShotGroup, currentGroup.nextSibling);

            const newScriptCell = newShotGroup.querySelector('.script-cell');
            let newText = parts[1] || '';
            if (newText.startsWith('<br>')) newText = newText.substring(4);
            newScriptCell.innerHTML = newText.trim();

            reindexTable();
            newShotGroup.querySelector('.shot-intro').focus();
        }

        // --- EXPORT LOGIC ---
        function getExportFilename(extension) {
            let name = document.getElementById('project-name').value.trim();
            if (!name) name = "Untitled_Project";
            name = name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            return `${name}_script.${extension}`;
        }

        function exportWord() {
            const tableClone = document.getElementById('script-table').cloneNode(true);
            
            tableClone.querySelectorAll('.shot-header-cell').forEach(cell => cell.setAttribute('colspan', '4'));
            tableClone.querySelectorAll('.delete-btn, .col-actions, .action-cell').forEach(el => el.remove());
            tableClone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));

            const originalSelects = document.querySelectorAll('#script-table .panel-type-select');
            tableClone.querySelectorAll('.panel-type-select').forEach((select, index) => {
                const liveSelect = originalSelects[index];
                let selectedText = liveSelect.options[liveSelect.selectedIndex].text;
                if (liveSelect.value === "NONE") selectedText = ""; 
                
                const textSpan = document.createElement('span');
                textSpan.innerText = selectedText;
                textSpan.style.fontWeight = "bold"; 
                select.parentNode.replaceChild(textSpan, select);
            });

            const html = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                <head><meta charset="utf-8"><title>Script Breakdown</title>
                <style>
                    table { border-collapse: collapse; width: 100%; font-family: Arial, sans-serif; }
                    th, td { border: 1px solid #000000; padding: 10px; vertical-align: top; }
                    th { background-color: #f2f2f2; text-align: left; }
                    .shot-header-cell { background-color: #e6e6e6; padding: 10px; }
                    .shot-label { color: #b87333; font-weight: bold; margin-right: 15px; }
                    .shot-intro { font-weight: bold; }
                    .shot-total { float: right; color: #27ae60; font-weight: bold; }
                    .direction-cell { color: #444444; font-style: italic; }
                    .shot-cell { font-weight: bold; text-align: center; }
                </style></head>
                <body>${tableClone.outerHTML}</body></html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = getExportFilename('doc');
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Shot,Script,Direction,Type,Price,Shot Total\n";
            document.querySelectorAll('.shot-group').forEach(group => {
                const shotLabel = group.querySelector('.shot-label').innerText;
                const shotIntro = group.querySelector('.shot-intro').innerText.replace(/"/g, '""');
                const shotTotalText = group.querySelector('.shot-total').innerText.replace("Total: ", "");
                
                csvContent += `"${shotLabel}","${shotIntro}","","","", "${shotTotalText}"\n`;

                group.querySelectorAll('.panel-row').forEach(panel => {
                    let shot = panel.querySelector('.shot-cell').innerText;
                    let script = panel.querySelector('.script-cell').innerText.replace(/"/g, '""');
                    let direction = panel.querySelector('.direction-cell').innerText.replace(/"/g, '""');
                    
                    let typeSelect = panel.querySelector('.panel-type-select').value;
                    let typeString = typeSelect === "NONE" ? "" : typeSelect;
                    let panelPrice = typeSelect === "NONE" ? "" : `$${PRICING[typeSelect]}`;

                    csvContent += `"${shot}","${script}","${direction}","${typeString}","${panelPrice}",""\n`;
                });
            });

            const link = document.createElement("a");
            link.href = encodeURI(csvContent);
            link.download = getExportFilename('csv');
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) {
                const active = document.activeElement;
                if (active && active.hasAttribute('contenteditable')) return;

                e.preventDefault();
                if (e.shiftKey) redo();
                else undo();
                return;
            }
            
            if ((e.key === 'y' || e.key === 'Y') && (e.ctrlKey || e.metaKey)) {
                const active = document.activeElement;
                if (active && active.hasAttribute('contenteditable')) return;
                e.preventDefault();
                redo();
                return;
            }

            if (e.key === 'Enter') {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    const activeElement = document.activeElement;
                    const row = activeElement.closest('.panel-row');
                    if (row) splitRowIntoNewShot(row);
                    else addShotAtBottom();
                } else if (e.shiftKey) {
                    e.preventDefault(); 
                    const activeElement = document.activeElement;
                    const row = activeElement.closest('.panel-row');
                    if (row) splitRowAtCursor(row);
                    else addPanelAtBottom();
                }
            }
        });

        // --- INITIALIZATION ---
        document.addEventListener("DOMContentLoaded", () => {
            const table = document.getElementById('script-table');
            if (table.querySelectorAll('.shot-group').length === 0) {
                const newShot = createShotGroup();
                table.appendChild(newShot);
                reindexTable();
                
                const firstScriptBox = newShot.querySelector('.script-cell');
                if (firstScriptBox) {
                    firstScriptBox.innerText = "Paste your entire script here. Shift+Enter creates a new panel. Ctrl+Enter (or Cmd+Enter on Mac) creates a completely new shot.";
                }
            }
        });
    </script>
</body>
</html>
